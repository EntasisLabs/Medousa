# SDK contract — single source of truth for Rust + Python accessor parity.
# Validated by scripts/check-sdk-contract.sh

version: 1

methods:
  # health
  - accessor: health
    method: get
    http: GET
    path: /health
    response_type: HealthResponse
    streaming: false
    sync: true

  # ingest
  - accessor: ingest
    method: post
    http: POST
    path: /v1/ingest
    request_type: IngestRequest
    response_type: IngestResponse
    streaming: false
    sync: true

  # local_models
  - accessor: local_models
    method: hardware
    http: GET
    path: /v1/local/hardware
    response_type: LocalHardwareResponse
    streaming: false
    sync: true
  - accessor: local_models
    method: catalog
    http: GET
    path: /v1/local/catalog
    response_type: LocalCatalogResponse
    streaming: false
    sync: true
  - accessor: local_models
    method: list
    http: GET
    path: /v1/local/models
    response_type: LocalModelsResponse
    streaming: false
    sync: true
  - accessor: local_models
    method: engine_status
    http: GET
    path: /v1/local/engine/status
    response_type: LocalEngineStatus
    streaming: false
    sync: true
  - accessor: local_models
    method: start_download
    http: POST
    path: /v1/local/models/download
    request_type: LocalModelDownloadRequest
    response_type: LocalModelDownloadResponse
    streaming: false
    sync: true
  - accessor: local_models
    method: remove_model
    http: DELETE
    path: /v1/local/models/{model_id}
    response_type: JsonValue
    streaming: false
    sync: true
  - accessor: local_models
    method: download_status
    http: GET
    path: /v1/local/models/download/{job_id}
    response_type: ModelDownloadProgress
    streaming: false
    sync: true
  - accessor: local_models
    method: download_events
    http: GET
    path: /v1/local/models/download/{job_id}/events
    response_type: ModelDownloadProgress
    streaming: true
    sync: false

  # jobs
  - accessor: jobs
