    http: POST
    path: /v1/jobs/ask
    request_type: EnqueueAskRequest
    response_type: EnqueueResponse
    streaming: false
    sync: true
  - accessor: jobs
    method: result
    http: GET
    path: /v1/jobs/{job_id}/result
