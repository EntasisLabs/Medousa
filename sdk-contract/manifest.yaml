    response_type: InteractiveTurnResponse
    streaming: false
    sync: true
  - accessor: interactive
    method: stream
    http: GET
    path: /v1/interactive/turn/{turn_id}/stream
    response_type: InteractiveTurnStreamEvent
    streaming: true
    sync: false
  - accessor: interactive
    method: cancel
