    streaming: false
    sync: true
  - accessor: jobs
    method: enqueue_report
    http: POST
    path: /v1/jobs/report
    request_type: EnqueueReportRequest
    response_type: EnqueueResponse
    streaming: false
    sync: true
  - accessor: jobs
    method: enqueue_prompt
    http: POST
    path: /v1/jobs/prompt
    request_type: EnqueuePromptRequest
    response_type: EnqueueResponse
