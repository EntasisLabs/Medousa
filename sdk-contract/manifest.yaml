    path: /v1/sessions/{session_id}
    response_type: SessionDeleteResponse
    streaming: false
    sync: true
  - accessor: sessions
    method: list_turns
    http: GET
    path: /v1/sessions/{session_id}/turns
    response_type: SessionHistoryResponse
    streaming: false
    sync: true
  - accessor: sessions
    method: active_turn
    http: GET
    path: /v1/sessions/{session_id}/active-turn
    response_type: JsonValue
    streaming: false
    sync: true
  - accessor: sessions
    method: cancel_active_turn
    http: POST
    path: /v1/sessions/{session_id}/active-turn
    response_type: JsonValue
    streaming: false
    sync: true

  # interactive
  - accessor: interactive
    method: start_turn
    http: POST
    path: /v1/interactive/turn
