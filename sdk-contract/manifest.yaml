    sync: true
  - accessor: jobs
    method: archive
    http: POST
    path: /v1/jobs/{job_id}/archive
    request_type: ArchiveAskJobRequest
    response_type: ArchiveAskJobResponse
    streaming: false
    sync: true

  # recurring
  - accessor: recurring
