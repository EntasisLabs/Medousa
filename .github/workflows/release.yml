name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            adapters/medousa-whatsapp

      - name: Build release binaries
        shell: bash
        run: |
          ./scripts/release/build.sh --target "${{ matrix.target }}"

      - name: Package release archive
        shell: bash
        run: |
          ./scripts/release/package.sh --target "${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-${{ matrix.target }}
          path: |
            dist/medousa-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Merge SHA256SUMS
        shell: bash
        run: |
          mkdir -p dist/final
          find dist/artifacts -name 'medousa-*.tar.gz' -exec cp {} dist/final/ \;
          : > dist/final/SHA256SUMS
          for archive in dist/final/medousa-*.tar.gz; do
            [[ -f "$archive" ]] || continue
            sha256sum "$(basename "$archive")" >> dist/final/SHA256SUMS
          done
          cd dist/final && ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/final/medousa-*.tar.gz
            dist/final/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
