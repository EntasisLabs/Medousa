name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v (default — Cargo.toml)"
        required: false
        type: string
      upload_r2:
        description: Upload artifacts to Cloudflare R2
        required: true
        type: boolean
        default: true
      publish_github:
        description: Create GitHub Release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Non-secret defaults — override in repo Variables if needed.
  MEDOUSA_RELEASE_BASE_URL: ${{ vars.MEDOUSA_RELEASE_BASE_URL || 'https://releases.entasislabs.com/medousa' }}
  MEDOUSA_RELEASE_CHANNEL: ${{ vars.MEDOUSA_RELEASE_CHANNEL || 'stable' }}
  MEDOUSA_R2_BUCKET: ${{ vars.MEDOUSA_R2_BUCKET || 'medousa' }}
  MEDOUSA_R2_ENDPOINT: ${{ vars.MEDOUSA_R2_ENDPOINT || 'https://3b2e3338687e8e0abd4c85280e87fd7a.r2.cloudflarestorage.com' }}
  MEDOUSA_R2_PREFIX: ${{ vars.MEDOUSA_R2_PREFIX || 'medousa/stable' }}

jobs:
  build-cli:
    name: cli (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            adapters/medousa-whatsapp

      - name: Build release binaries
        run: |
          ./scripts/release/build.sh --target "${{ matrix.target }}"

      - name: Package release archives
        run: |
          ./scripts/release/package-all-components.sh --target "${{ matrix.target }}"
          ./scripts/release/package-local-brain.sh --target "${{ matrix.target }}" || true

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-cli-${{ matrix.target }}
          path: |
            dist/engine-*.tar.gz
            dist/cli-*.tar.gz
            dist/adapter-*.tar.gz
            dist/mcp-gateway-*.tar.gz
            dist/medousa-*.tar.gz
            dist/medousa_local-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  build-desktop:
    name: app (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    environment: ${{ matrix.os == 'macos-14' && 'MEDOUSA' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-aarch64
            native_build: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
            native_build: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
            native_build: true

    defaults:
      run:
        shell: bash
        working-directory: apps/medousa-home

    steps:
      - uses: actions/checkout@v4

      - name: Prepare CI scripts
        working-directory: .
        run: chmod +x scripts/ci/*.sh

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/medousa-home/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/medousa-home/src-tauri

      - name: Validate Apple signing secrets
        if: matrix.os == 'macos-14'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -z "${APPLE_CERTIFICATE:-}" ]] && missing+=(APPLE_CERTIFICATE)
          [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]] && missing+=(APPLE_CERTIFICATE_PASSWORD)
          [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]] && missing+=(APPLE_SIGNING_IDENTITY)
          [[ -z "${APPLE_ID:-}" ]] && missing+=(APPLE_ID)
          [[ -z "${APPLE_PASSWORD:-}" ]] && missing+=(APPLE_PASSWORD)
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=(APPLE_TEAM_ID)
          if ((${#missing[@]})); then
            echo "::error::Missing Apple signing values: ${missing[*]}"
            echo "Add them as **Environment secrets** on GitHub → Settings → Environments → Medousa"
            echo "(Repository secrets also work if you remove the job's environment: line.)"
            exit 1
          fi
          echo "Apple signing secrets are present."

      - name: Import Apple Developer certificate
        if: matrix.os == 'macos-14'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KP="${KEYCHAIN_PASSWORD:-medousa-ci-keychain}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KP" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "::error::APPLE_CERTIFICATE must contain a Developer ID Application cert (for .dmg distribution)."
            echo "You imported Apple Development — that is for local/Xcode builds only."
            echo "Export Developer ID Application from Keychain Access and update the Medousa environment secret."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop app
        env:
          CI: true
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        run: |
          if [[ "${{ matrix.native_build }}" == "true" ]]; then
            npm run tauri:build
          else
            export CARGO_BUILD_TARGET="${{ matrix.target }}"
            npm run tauri:build -- --target "${{ matrix.target }}"
          fi

      - name: Azure login (Windows signing)
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows desktop bundles
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_CODESIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\apps\medousa-home\src-tauri\target\${{ matrix.target }}\release\bundle
          files-folder-filter: exe,msi,dll
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Stage desktop installers
        working-directory: .
        run: |
          TARGET="${{ matrix.target }}"
          if [[ "${{ matrix.native_build }}" == "true" ]]; then
            TARGET=""
          fi
          ./scripts/ci/stage-tauri-bundle.sh \
            apps/medousa-home/src-tauri \
            "dist/desktop/${{ matrix.name }}" \
            "${TARGET}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-desktop-${{ matrix.name }}
          path: dist/desktop/${{ matrix.name }}/*
          if-no-files-found: error

  build-installer:
    name: installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    environment: ${{ matrix.os == 'macos-14' && 'MEDOUSA' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-aarch64
            native_build: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
            native_build: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
            native_build: true

    defaults:
      run:
        shell: bash
        working-directory: apps/medousa-installer

    steps:
      - uses: actions/checkout@v4

      - name: Prepare CI scripts
        working-directory: .
        run: chmod +x scripts/ci/*.sh

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/medousa-installer/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/medousa-installer/src-tauri

      - name: Validate Apple signing secrets
        if: matrix.os == 'macos-14'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -z "${APPLE_CERTIFICATE:-}" ]] && missing+=(APPLE_CERTIFICATE)
          [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]] && missing+=(APPLE_CERTIFICATE_PASSWORD)
          [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]] && missing+=(APPLE_SIGNING_IDENTITY)
          [[ -z "${APPLE_ID:-}" ]] && missing+=(APPLE_ID)
          [[ -z "${APPLE_PASSWORD:-}" ]] && missing+=(APPLE_PASSWORD)
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=(APPLE_TEAM_ID)
          if ((${#missing[@]})); then
            echo "::error::Missing Apple signing values: ${missing[*]}"
            exit 1
          fi
          echo "Apple signing secrets are present."

      - name: Import Apple Developer certificate
        if: matrix.os == 'macos-14'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KP="${KEYCHAIN_PASSWORD:-medousa-ci-keychain}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KP" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "::error::APPLE_CERTIFICATE must contain a Developer ID Application cert."
            exit 1
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Configure installer CDN URL
        working-directory: .
        env:
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
        run: ./scripts/release/set-installer-config.sh

      - name: Build installer
        env:
          CI: true
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        run: |
          if [[ "${{ matrix.native_build }}" == "true" ]]; then
            npm run tauri build
          else
            npm run tauri build -- --target "${{ matrix.target }}"
          fi

      - name: Azure login (Windows signing)
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows installer bundles
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_CODESIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\apps\medousa-installer\src-tauri\target\${{ matrix.target }}\release\bundle
          files-folder-filter: exe,msi,dll
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Stage installer bundles
        working-directory: .
        run: |
          TARGET="${{ matrix.target }}"
          if [[ "${{ matrix.native_build }}" == "true" ]]; then
            TARGET=""
          fi
          ./scripts/ci/stage-tauri-bundle.sh \
            apps/medousa-installer/src-tauri \
            "dist/installer/${{ matrix.name }}" \
            "${TARGET}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-installer-${{ matrix.name }}
          path: dist/installer/${{ matrix.name }}/*
          if-no-files-found: warn

  release:
    name: publish (GitHub + R2)
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    needs: [build-cli, build-desktop, build-installer]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
            v="${v#v}"
            echo "version=${v}" >> "$GITHUB_OUTPUT"
            echo "tag=v${v}" >> "$GITHUB_OUTPUT"
          else
            v="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
            echo "version=${v}" >> "$GITHUB_OUTPUT"
            echo "tag=v${v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Merge release assets
        run: |
          mkdir -p dist/final
          find dist/artifacts -name 'engine-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'cli-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'adapter-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'mcp-gateway-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'medousa-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'medousa_local-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -type f \( \
            -name 'MedousaInstaller*' -o \
            -name 'Medousa_*' -o \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
            \) -exec cp {} dist/final/ \;
          : > dist/final/SHA256SUMS
          shopt -s nullglob
          for archive in dist/final/*.tar.gz dist/final/*.dmg dist/final/*.AppImage dist/final/*.deb dist/final/*.msi dist/final/*.exe; do
            [[ -f "$archive" ]] || continue
            (cd dist/final && sha256sum "$(basename "$archive")") >> dist/final/SHA256SUMS
          done
          cd dist/final && ls -la

      - name: Generate release manifests
        env:
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
        run: |
          ./scripts/release/publish-self-hosted.sh \
            --staging dist/final \
            --version "${{ steps.version.outputs.version }}" \
            --channel "${MEDOUSA_RELEASE_CHANNEL}" \
            --base-url "${MEDOUSA_RELEASE_BASE_URL}"

      - name: Upload to Cloudflare R2
        if: github.event_name == 'push' || github.event.inputs.upload_r2 != 'false'
        env:
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
          MEDOUSA_R2_BUCKET: ${{ env.MEDOUSA_R2_BUCKET }}
          MEDOUSA_R2_ENDPOINT: ${{ env.MEDOUSA_R2_ENDPOINT }}
          MEDOUSA_R2_PREFIX: ${{ env.MEDOUSA_R2_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [[ -z "${AWS_ACCESS_KEY_ID:-}" || -z "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "::error::R2 secrets missing — add R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY in repo Secrets"
            exit 1
          fi
          ./scripts/release/upload-r2.sh dist/final

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.publish_github != 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Medousa ${{ steps.version.outputs.tag }}
          files: |
            dist/final/engine-*.tar.gz
            dist/final/cli-*.tar.gz
            dist/final/adapter-*.tar.gz
            dist/final/mcp-gateway-*.tar.gz
            dist/final/medousa-*.tar.gz
            dist/final/medousa_local-*.tar.gz
            dist/final/release-manifest.json
            dist/final/installer-bootstrap.json
            dist/final/MedousaInstaller*
            dist/final/*.dmg
            dist/final/*.msi
            dist/final/*.exe
            dist/final/*.AppImage
            dist/final/*.deb
            dist/final/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: false
