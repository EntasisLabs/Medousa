name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Channel-head version without v (default — max package-versions / Cargo.toml)"
        required: false
        type: string
      ship_all:
        description: Ship every component group (same as a v* tag)
        required: true
        type: boolean
        default: false
      ship_engine:
        description: Ship engine (medousa + medousa_daemon)
        required: true
        type: boolean
        default: false
      ship_cli:
        description: Ship CLI + TUI
        required: true
        type: boolean
        default: false
      ship_adapters:
        description: Ship channel adapters (telegram/discord/slack/whatsapp)
        required: true
        type: boolean
        default: false
      ship_mcp:
        description: Ship MCP gateway
        required: true
        type: boolean
        default: false
      ship_desktop:
        description: Ship Medousa Home desktop
        required: true
        type: boolean
        default: false
      ship_installer:
        description: Ship Medousa Installer
        required: true
        type: boolean
        default: false
      ship_local_brain:
        description: Ship offline local-brain
        required: true
        type: boolean
        default: false
      upload_r2:
        description: Upload artifacts to Cloudflare R2
        required: true
        type: boolean
        default: true
      publish_github:
        description: Create GitHub Release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Vite production builds (tauri beforeBuildCommand) routinely exceed Node's ~2GB
  # default heap on GitHub-hosted macOS runners (~7GB RAM). Without this, npm run
  # build OOMs with exit 134 while Linux/Windows often scrape by.
  NODE_OPTIONS: --max-old-space-size=4096
  # Keep the target dir inside the workspace. On self-hosted runners github.workspace
  # persists between runs, so this doubles as a warm incremental cache with no cache
  # action needed. (.cargo/config.toml points at ../.cache/cargo-target, outside
  # GITHUB_WORKSPACE, so this override keeps it inside.)
  CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo-target
  # Non-secret defaults — override in repo Variables if needed.
  MEDOUSA_RELEASE_BASE_URL: ${{ vars.MEDOUSA_RELEASE_BASE_URL || 'https://releases.entasislabs.com/medousa' }}
  MEDOUSA_RELEASE_CHANNEL: ${{ vars.MEDOUSA_RELEASE_CHANNEL || 'stable' }}
  MEDOUSA_R2_BUCKET: ${{ vars.MEDOUSA_R2_BUCKET || 'medousa' }}
  MEDOUSA_R2_ENDPOINT: ${{ vars.MEDOUSA_R2_ENDPOINT || 'https://3b2e3338687e8e0abd4c85280e87fd7a.r2.cloudflarestorage.com' }}
  MEDOUSA_R2_PREFIX: ${{ vars.MEDOUSA_R2_PREFIX || 'medousa/stable' }}
  # Optional shared compile cache across the fleet (great for the diskless mini-PCs
  # that do not keep a warm target dir). Inert unless you set the repo variable
  # MEDOUSA_SCCACHE (e.g. to 'sccache') AND configure the SCCACHE_* backend env on
  # the runners. See scripts/ci/sccache-setup.md. sccache requires CARGO_INCREMENTAL=0.
  RUSTC_WRAPPER: ${{ vars.MEDOUSA_SCCACHE || '' }}
  CARGO_INCREMENTAL: ${{ vars.MEDOUSA_SCCACHE != '' && '0' || '' }}

jobs:
  # ---------------------------------------------------------------------------
  # HOSTED vs SELF-HOSTED toggle
  # Set the repo variable MEDOUSA_SELF_HOSTED to switch where release builds run:
  #   'true'          -> self-hosted fleet (uses matrix.runner labels)
  #   unset / anything else -> GitHub-hosted runners (uses matrix.os) + Swatinem cache
  # GitHub-hosted is the SAFE DEFAULT: if the variable is missing, releases still
  # build on hosted runners instead of hanging waiting for self-hosted runners.
  # Each build job carries BOTH a `runner` (self-hosted labels) and an `os`
  # (GitHub-hosted label); runs-on picks between them from the variable.
  #
  # Self-hosted runner labels (assign when registering runners on your fleet):
  #   Apple Silicon Mac : [self-hosted, macOS, ARM64]
  #   Intel Mac         : [self-hosted, macOS, X64]
  #   Windows           : [self-hosted, Windows, X64]   (git-bash must be on PATH)
  #   Linux / mini-PCs  : [self-hosted, Linux, X64]
  #   Home server       : [self-hosted, Linux, X64, medousa-publish]  (publish job)
  #
  # On self-hosted, github.workspace persists across runs so CARGO_TARGET_DIR acts
  # as a warm incremental cache and the Swatinem cache step is skipped. On hosted,
  # the Swatinem cache step runs (guarded by MEDOUSA_SELF_HOSTED == 'false').
  # CI (ci.yml) always stays on GitHub-hosted runners.
  # ---------------------------------------------------------------------------

  # Resolve which component groups to ship. Tag pushes always ship everything.
  prepare:
    name: prepare release selection
    runs-on: ubuntu-latest
    outputs:
      ship_engine: ${{ steps.sel.outputs.ship_engine }}
      ship_cli: ${{ steps.sel.outputs.ship_cli }}
      ship_adapters: ${{ steps.sel.outputs.ship_adapters }}
      ship_mcp: ${{ steps.sel.outputs.ship_mcp }}
      ship_desktop: ${{ steps.sel.outputs.ship_desktop }}
      ship_installer: ${{ steps.sel.outputs.ship_installer }}
      ship_local_brain: ${{ steps.sel.outputs.ship_local_brain }}
      full_train: ${{ steps.sel.outputs.full_train }}
      version: ${{ steps.sel.outputs.version }}
      tag: ${{ steps.sel.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: sel
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            FULL=1
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            FULL=0
            [[ "${{ github.event.inputs.ship_all }}" == "true" ]] && FULL=1
            if [[ -n "${{ github.event.inputs.version }}" ]]; then
              VERSION="${{ github.event.inputs.version }}"
              VERSION="${VERSION#v}"
            else
              VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
            fi
            TAG="v${VERSION}"
          fi

          source scripts/release/common.sh
          if [[ "${FULL}" -eq 1 ]]; then
            medousa_assert_full_train_versions "${VERSION}"
            E=true; C=true; A=true; M=true; D=true; I=true; L=true
          else
            E="${{ github.event.inputs.ship_engine }}"
            C="${{ github.event.inputs.ship_cli }}"
            A="${{ github.event.inputs.ship_adapters }}"
            M="${{ github.event.inputs.ship_mcp }}"
            D="${{ github.event.inputs.ship_desktop }}"
            I="${{ github.event.inputs.ship_installer }}"
            L="${{ github.event.inputs.ship_local_brain }}"
            if [[ "${E}" != "true" && "${C}" != "true" && "${A}" != "true" && "${M}" != "true" && "${D}" != "true" && "${I}" != "true" && "${L}" != "true" ]]; then
              echo "::error::Select at least one ship_* component (or ship_all)"
              exit 1
            fi
            # Channel head for targeted ships: max(input/cargo, package-versions).
            VERSION="$(medousa_semver_max "${VERSION}" "$(medousa_max_package_version)")"
            TAG="v${VERSION}"
          fi

          {
            echo "ship_engine=${E}"
            echo "ship_cli=${C}"
            echo "ship_adapters=${A}"
            echo "ship_mcp=${M}"
            echo "ship_desktop=${D}"
            echo "ship_installer=${I}"
            echo "ship_local_brain=${L}"
            echo "full_train=${FULL}"
            echo "version=${VERSION}"
            echo "tag=${TAG}"
          } >> "${GITHUB_OUTPUT}"
          echo "Release selection: engine=${E} cli=${C} adapters=${A} mcp=${M} desktop=${D} installer=${I} local-brain=${L} full=${FULL} v=${VERSION}"

  # Daemon (+ launcher) build. Feeds desktop sidecar and engine packaging so
  # other jobs do not recompile medousa_daemon.
  build-daemon:
    name: daemon (${{ matrix.name }})
    needs: prepare
    if: needs.prepare.outputs.ship_engine == 'true' || needs.prepare.outputs.ship_desktop == 'true'
    runs-on: ${{ vars.MEDOUSA_SELF_HOSTED == 'true' && matrix.runner || matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            target: aarch64-apple-darwin
            os: macos-14
            runner: [self-hosted, macOS, ARM64]
          - name: macos-x64
            target: x86_64-apple-darwin
            os: macos-15-intel
            runner: [self-hosted, macOS, X64]
          - name: windows-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            runner: [self-hosted, Windows, X64]
          - name: linux-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            runner: [self-hosted, Linux, X64]
          - name: linux-aarch64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            runner: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache (hosted only)
        if: ${{ vars.MEDOUSA_SELF_HOSTED != 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> .cache/cargo-target
          cache-workspace-crates: true
          cache-on-failure: true
          shared-key: release-daemon-${{ matrix.name }}

      - name: Build medousa + medousa_daemon
        run: |
          cargo build --release -p medousa --bin medousa --bin medousa_daemon \
            --features iroh-transport --target "${{ matrix.target }}"

      - name: Stage daemon + launcher binaries
        run: |
          EXT=""
          [[ "${{ matrix.target }}" == *-pc-windows-msvc ]] && EXT=".exe"
          REL="${CARGO_TARGET_DIR}/${{ matrix.target }}/release"
          mkdir -p dist/daemon
          cp -f "${REL}/medousa_daemon${EXT}" "dist/daemon/medousa_daemon-${{ matrix.target }}${EXT}"
          cp -f "${REL}/medousa${EXT}" "dist/daemon/medousa-${{ matrix.target }}${EXT}"

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-daemon-${{ matrix.target }}
          path: dist/daemon/*
          if-no-files-found: error

  build-cli:
    name: cli/engine (${{ matrix.target }})
    needs: [prepare, build-daemon]
    if: |
      always() && !cancelled() &&
      (needs.prepare.outputs.ship_cli == 'true' || needs.prepare.outputs.ship_engine == 'true') &&
      (
        needs.prepare.outputs.ship_engine != 'true' ||
        needs.build-daemon.result == 'success'
      )
    runs-on: ${{ vars.MEDOUSA_SELF_HOSTED == 'true' && matrix.runner || matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            runner: [self-hosted, Linux, X64]
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            runner: [self-hosted, Linux, X64]
          - target: aarch64-apple-darwin
            os: macos-14
            runner: [self-hosted, macOS, ARM64]
          - target: x86_64-apple-darwin
            os: macos-15-intel
            runner: [self-hosted, macOS, X64]
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            runner: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache (hosted only)
        if: ${{ vars.MEDOUSA_SELF_HOSTED != 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> .cache/cargo-target
          cache-workspace-crates: true
          cache-on-failure: true
          shared-key: release-cli-${{ matrix.target }}

      - name: Download prebuilt daemon
        if: needs.prepare.outputs.ship_engine == 'true'
        uses: actions/download-artifact@v4
        with:
          name: medousa-daemon-${{ matrix.target }}
          path: dist/prebuilt-daemon

      - name: Build selected bins (reuse daemon when present)
        env:
          SHIP_ENGINE: ${{ needs.prepare.outputs.ship_engine }}
          SHIP_CLI: ${{ needs.prepare.outputs.ship_cli }}
        run: |
          EXT=""
          [[ "${{ matrix.target }}" == *-pc-windows-msvc ]] && EXT=".exe"
          COMPS=()
          [[ "${SHIP_ENGINE}" == "true" ]] && COMPS+=(engine)
          [[ "${SHIP_CLI}" == "true" ]] && COMPS+=(cli)
          COMP_CSV="$(IFS=,; echo "${COMPS[*]}")"
          DAEMON="dist/prebuilt-daemon/medousa_daemon-${{ matrix.target }}${EXT}"
          LAUNCHER="dist/prebuilt-daemon/medousa-${{ matrix.target }}${EXT}"
          if [[ "${SHIP_ENGINE}" == "true" && -f "${DAEMON}" ]]; then
            export MEDOUSA_PREBUILT_DAEMON="${GITHUB_WORKSPACE}/${DAEMON}"
          fi
          if [[ "${SHIP_ENGINE}" == "true" && -f "${LAUNCHER}" ]]; then
            export MEDOUSA_PREBUILT_LAUNCHER="${GITHUB_WORKSPACE}/${LAUNCHER}"
          fi
          ./scripts/release/build.sh \
            --target "${{ matrix.target }}" \
            --without-local-brain \
            --components "${COMP_CSV}"

      - name: Package selected archives
        env:
          SHIP_ENGINE: ${{ needs.prepare.outputs.ship_engine }}
          SHIP_CLI: ${{ needs.prepare.outputs.ship_cli }}
        run: |
          PKGS=()
          [[ "${SHIP_ENGINE}" == "true" ]] && PKGS+=(engine)
          [[ "${SHIP_CLI}" == "true" ]] && PKGS+=(cli)
          PKG_CSV="$(IFS=,; echo "${PKGS[*]}")"
          SUITE_FLAG=()
          [[ "${SHIP_ENGINE}" == "true" && "${SHIP_CLI}" == "true" ]] || SUITE_FLAG=(--skip-suite)
          ./scripts/release/package-all-components.sh \
            --target "${{ matrix.target }}" \
            --packages "${PKG_CSV}" \
            "${SUITE_FLAG[@]}"
          # suite when engine+cli both shipping
          if [[ "${SHIP_ENGINE}" == "true" && "${SHIP_CLI}" == "true" ]]; then
            ./scripts/release/package.sh --target "${{ matrix.target }}"
          fi

      - name: Upload CLI/engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-cli-${{ matrix.target }}
          path: |
            dist/engine-*.tar.gz
            dist/cli-*.tar.gz
            dist/medousa-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  build-adapters:
    name: adapters (${{ matrix.target }})
    needs: prepare
    if: needs.prepare.outputs.ship_adapters == 'true'
    runs-on: ${{ vars.MEDOUSA_SELF_HOSTED == 'true' && matrix.runner || matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            runner: [self-hosted, Linux, X64]
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            runner: [self-hosted, Linux, X64]
          - target: aarch64-apple-darwin
            os: macos-14
            runner: [self-hosted, macOS, ARM64]
          - target: x86_64-apple-darwin
            os: macos-15-intel
            runner: [self-hosted, macOS, X64]
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            runner: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust cache (hosted only)
        if: ${{ vars.MEDOUSA_SELF_HOSTED != 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> .cache/cargo-target
          cache-workspace-crates: true
          cache-on-failure: true
          shared-key: release-adapters-${{ matrix.target }}
      - name: Build adapters
        run: |
          ./scripts/release/build.sh \
            --target "${{ matrix.target }}" \
            --without-local-brain \
            --components adapters
      - name: Package adapters
        run: |
          ./scripts/release/package-all-components.sh \
            --target "${{ matrix.target }}" \
            --packages adapter-telegram,adapter-discord,adapter-slack,adapter-whatsapp \
            --skip-suite
      - name: Upload adapters artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-adapters-${{ matrix.target }}
          path: |
            dist/adapter-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  build-mcp:
    name: mcp (${{ matrix.target }})
    needs: prepare
    if: needs.prepare.outputs.ship_mcp == 'true'
    runs-on: ${{ vars.MEDOUSA_SELF_HOSTED == 'true' && matrix.runner || matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            runner: [self-hosted, Linux, X64]
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            runner: [self-hosted, Linux, X64]
          - target: aarch64-apple-darwin
            os: macos-14
            runner: [self-hosted, macOS, ARM64]
          - target: x86_64-apple-darwin
            os: macos-15-intel
            runner: [self-hosted, macOS, X64]
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            runner: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust cache (hosted only)
        if: ${{ vars.MEDOUSA_SELF_HOSTED != 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> .cache/cargo-target
          cache-workspace-crates: true
          cache-on-failure: true
          shared-key: release-mcp-${{ matrix.target }}
      - name: Build MCP gateway
        run: |
          ./scripts/release/build.sh \
            --target "${{ matrix.target }}" \
            --without-local-brain \
            --components mcp
      - name: Package MCP gateway
        run: |
          ./scripts/release/package-all-components.sh \
            --target "${{ matrix.target }}" \
            --packages mcp-gateway \
            --skip-suite
      - name: Upload MCP artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-mcp-${{ matrix.target }}
          path: |
            dist/mcp-gateway-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  build-desktop:
    name: app (${{ matrix.name }})
    needs: [prepare, build-daemon]
    if: |
      always() && !cancelled() &&
      needs.prepare.outputs.ship_desktop == 'true' &&
      needs.build-daemon.result == 'success'
    runs-on: ${{ vars.MEDOUSA_SELF_HOSTED == 'true' && matrix.runner || matrix.os }}
    permissions:
      contents: read
      id-token: write
    environment: ${{ (matrix.name == 'macos-aarch64' || matrix.name == 'windows-x64') && 'MEDOUSA' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macos-aarch64
            native_build: true
            os: macos-14
            runner: [self-hosted, macOS, ARM64]
          - target: x86_64-pc-windows-msvc
            name: windows-x64
            native_build: true
            os: windows-latest
            runner: [self-hosted, Windows, X64]
          - target: x86_64-unknown-linux-gnu
            name: linux-x64
            native_build: true
            os: ubuntu-22.04
            runner: [self-hosted, Linux, X64]

    defaults:
      run:
        shell: bash
        working-directory: apps/medousa-home

    steps:
      - uses: actions/checkout@v4

      - name: Prepare CI scripts
        working-directory: .
        run: chmod +x scripts/ci/*.sh

      - name: Install Linux dependencies
        if: matrix.name == 'linux-x64'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/medousa-home/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache (hosted only)
        if: ${{ vars.MEDOUSA_SELF_HOSTED != 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> .cache/cargo-target
            apps/medousa-home/src-tauri -> .cache/cargo-target
          cache-workspace-crates: true
          cache-on-failure: true
          shared-key: release-desktop-${{ matrix.name }}

      - name: Download prebuilt daemon
        uses: actions/download-artifact@v4
        with:
          name: medousa-daemon-${{ matrix.target }}
          path: dist/prebuilt-daemon

      - name: Point sidecar at prebuilt daemon
        working-directory: .
        run: |
          EXT=""
          [[ "${{ matrix.target }}" == *-pc-windows-msvc ]] && EXT=".exe"
          DAEMON="${GITHUB_WORKSPACE}/dist/prebuilt-daemon/medousa_daemon-${{ matrix.target }}${EXT}"
          if [[ ! -f "${DAEMON}" ]]; then
            echo "::error::prebuilt daemon not found at ${DAEMON}"
            exit 1
          fi
          echo "MEDOUSA_SIDECAR_DAEMON=${DAEMON}" >> "${GITHUB_ENV}"
          echo "prepare-engine-sidecar will reuse: ${DAEMON}"

      - name: Validate Apple signing secrets
        if: matrix.name == 'macos-aarch64'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -z "${APPLE_CERTIFICATE:-}" ]] && missing+=(APPLE_CERTIFICATE)
          [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]] && missing+=(APPLE_CERTIFICATE_PASSWORD)
          [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]] && missing+=(APPLE_SIGNING_IDENTITY)
          [[ -z "${APPLE_ID:-}" ]] && missing+=(APPLE_ID)
          [[ -z "${APPLE_PASSWORD:-}" ]] && missing+=(APPLE_PASSWORD)
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=(APPLE_TEAM_ID)
          if ((${#missing[@]})); then
            echo "::error::Missing Apple signing values: ${missing[*]}"
            echo "Add them as Repository secrets (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          echo "Apple signing secrets are present."

      # On a self-hosted Mac you can instead sign from the machine's login
      # keychain (skip this import + drop the APPLE_CERTIFICATE secret) — leave
      # the identity available to codesign and set APPLE_SIGNING_IDENTITY only.
      - name: Import Apple Developer certificate
        if: matrix.name == 'macos-aarch64'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KP="${KEYCHAIN_PASSWORD:-medousa-ci-keychain}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KP" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "::error::APPLE_CERTIFICATE must contain a Developer ID Application cert (for .dmg distribution)."
            echo "You imported Apple Development — that is for local/Xcode builds only."
            echo "Export Developer ID Application from Keychain Access and update the Medousa environment secret."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop app
        env:
          CI: true
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        working-directory: .
        run: |
          EXTRA=()
          [[ "${{ matrix.name }}" == "linux-x64" ]] && EXTRA=(--bundles deb)
          cd apps/medousa-home
          if [[ "${{ matrix.native_build }}" == "true" ]]; then
            npm run tauri:build -- "${EXTRA[@]}"
          else
            export CARGO_BUILD_TARGET="${{ matrix.target }}"
            npm run tauri:build -- "${EXTRA[@]}" --target "${{ matrix.target }}"
          fi

      - name: Azure login (Windows signing)
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Windows bundle dir
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        working-directory: .
        run: |
          BUNDLE="$(./scripts/ci/resolve-tauri-bundle-dir.sh apps/medousa-home/src-tauri)"
          # The Azure signing action is a Windows/PowerShell tool; hand it a native
          # path (D:/a/...), not the MSYS path (/d/a/...) which PowerShell mangles
          # into D:\d\a\... against the current drive root.
          if command -v cygpath >/dev/null 2>&1; then
            BUNDLE="$(cygpath -m "${BUNDLE}")"
          fi
          echo "BUNDLE_DIR=${BUNDLE}" >> "${GITHUB_ENV}"

      - name: Sign Windows desktop bundles
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_CODESIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGNING_PROFILE }}
          files-folder: ${{ env.BUNDLE_DIR }}
          files-folder-filter: exe,msi,dll
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Stage desktop installers
        working-directory: .
        run: |
          TARGET="${{ matrix.target }}"
          if [[ "${{ matrix.native_build }}" == "true" ]]; then
            TARGET=""
          fi
          ./scripts/ci/stage-tauri-bundle.sh \
            apps/medousa-home/src-tauri \
            "dist/desktop/${{ matrix.name }}" \
            "${TARGET}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-desktop-${{ matrix.name }}
          path: dist/desktop/${{ matrix.name }}/*
          if-no-files-found: error

  build-installer:
    name: installer (${{ matrix.name }})
    needs: prepare
    if: needs.prepare.outputs.ship_installer == 'true'
    runs-on: ${{ vars.MEDOUSA_SELF_HOSTED == 'true' && matrix.runner || matrix.os }}
    permissions:
      contents: read
      id-token: write
    environment: ${{ (matrix.name == 'macos-aarch64' || matrix.name == 'windows-x64') && 'MEDOUSA' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macos-aarch64
            native_build: true
            os: macos-14
            runner: [self-hosted, macOS, ARM64]
          - target: x86_64-pc-windows-msvc
            name: windows-x64
            native_build: true
            os: windows-latest
            runner: [self-hosted, Windows, X64]
          - target: x86_64-unknown-linux-gnu
            name: linux-x64
            native_build: true
            os: ubuntu-22.04
            runner: [self-hosted, Linux, X64]

    defaults:
      run:
        shell: bash
        working-directory: apps/medousa-installer

    steps:
      - uses: actions/checkout@v4

      - name: Prepare CI scripts
        working-directory: .
        run: chmod +x scripts/ci/*.sh

      - name: Install Linux dependencies
        if: matrix.name == 'linux-x64'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/medousa-installer/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache (hosted only)
        if: ${{ vars.MEDOUSA_SELF_HOSTED != 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> .cache/cargo-target
            apps/medousa-installer/src-tauri -> .cache/cargo-target
          cache-workspace-crates: true
          cache-on-failure: true
          shared-key: release-installer-${{ matrix.name }}

      - name: Validate Apple signing secrets
        if: matrix.name == 'macos-aarch64'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -z "${APPLE_CERTIFICATE:-}" ]] && missing+=(APPLE_CERTIFICATE)
          [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]] && missing+=(APPLE_CERTIFICATE_PASSWORD)
          [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]] && missing+=(APPLE_SIGNING_IDENTITY)
          [[ -z "${APPLE_ID:-}" ]] && missing+=(APPLE_ID)
          [[ -z "${APPLE_PASSWORD:-}" ]] && missing+=(APPLE_PASSWORD)
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=(APPLE_TEAM_ID)
          if ((${#missing[@]})); then
            echo "::error::Missing Apple signing values: ${missing[*]}"
            exit 1
          fi
          echo "Apple signing secrets are present."

      - name: Import Apple Developer certificate
        if: matrix.name == 'macos-aarch64'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KP="${KEYCHAIN_PASSWORD:-medousa-ci-keychain}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KP" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "::error::APPLE_CERTIFICATE must contain a Developer ID Application cert."
            exit 1
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Configure installer CDN URL
        working-directory: .
        env:
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
        run: ./scripts/release/set-installer-config.sh

      - name: Build installer
        env:
          CI: true
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        working-directory: .
        run: |
          EXTRA=()
          [[ "${{ matrix.name }}" == "linux-x64" ]] && EXTRA=(--bundles deb)
          cd apps/medousa-installer
          if [[ "${{ matrix.native_build }}" == "true" ]]; then
            npm run tauri build -- "${EXTRA[@]}"
          else
            npm run tauri build -- "${EXTRA[@]}" --target "${{ matrix.target }}"
          fi

      - name: Azure login (Windows signing)
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Windows bundle dir
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        working-directory: .
        run: |
          BUNDLE="$(./scripts/ci/resolve-tauri-bundle-dir.sh apps/medousa-installer/src-tauri)"
          # The Azure signing action is a Windows/PowerShell tool; hand it a native
          # path (D:/a/...), not the MSYS path (/d/a/...) which PowerShell mangles
          # into D:\d\a\... against the current drive root.
          if command -v cygpath >/dev/null 2>&1; then
            BUNDLE="$(cygpath -m "${BUNDLE}")"
          fi
          echo "BUNDLE_DIR=${BUNDLE}" >> "${GITHUB_ENV}"

      - name: Sign Windows installer bundles
        if: matrix.name == 'windows-x64' && vars.AZURE_CODESIGNING_ACCOUNT != ''
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_CODESIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGNING_PROFILE }}
          files-folder: ${{ env.BUNDLE_DIR }}
          files-folder-filter: exe,msi,dll
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Stage installer bundles
        working-directory: .
        run: |
          TARGET="${{ matrix.target }}"
          if [[ "${{ matrix.native_build }}" == "true" ]]; then
            TARGET=""
          fi
          ./scripts/ci/stage-tauri-bundle.sh \
            apps/medousa-installer/src-tauri \
            "dist/installer/${{ matrix.name }}" \
            "${TARGET}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-installer-${{ matrix.name }}
          path: dist/installer/${{ matrix.name }}/*
          if-no-files-found: warn

  # mistralrs offline brain — heavy + slow. Isolated into its own job so it never
  # blocks build-desktop/build-installer (they do not bundle it by default) and its
  # large target-dir churn stays off the hot path. The publish job waits for it only
  # at the final aggregation. No native ARM64 Linux host in the fleet, so that leg is
  # omitted here (cross-compiling mistralrs is not supported by this setup).
  build-local-brain:
    name: local-brain (${{ matrix.target }})
    needs: prepare
    if: needs.prepare.outputs.ship_local_brain == 'true'
    runs-on: ${{ vars.MEDOUSA_SELF_HOSTED == 'true' && matrix.runner || matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            runner: [self-hosted, Linux, X64]
          - target: aarch64-apple-darwin
            os: macos-14
            runner: [self-hosted, macOS, ARM64]
          - target: x86_64-apple-darwin
            os: macos-15-intel
            runner: [self-hosted, macOS, X64]
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            runner: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache (hosted only)
        if: ${{ vars.MEDOUSA_SELF_HOSTED != 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> .cache/cargo-target
          cache-workspace-crates: true
          cache-on-failure: true
          shared-key: release-local-brain-${{ matrix.target }}

      - name: Build offline brain
        run: ./scripts/release/build-local-brain.sh --target "${{ matrix.target }}"

      - name: Package offline brain
        run: ./scripts/release/package-local-brain.sh --target "${{ matrix.target }}"

      - name: Upload local-brain artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-local-brain-${{ matrix.target }}
          path: dist/medousa_local-*.tar.gz
          if-no-files-found: error

  release:
    name: publish (GitHub + R2)
    needs:
      [
        prepare,
        build-cli,
        build-adapters,
        build-mcp,
        build-desktop,
        build-installer,
        build-local-brain,
      ]
    # Skipped legs are OK — only fail if a selected job failed.
    if: |
      always() && !cancelled() &&
      needs.prepare.result == 'success' &&
      (needs.build-cli.result == 'success' || needs.build-cli.result == 'skipped') &&
      (needs.build-adapters.result == 'success' || needs.build-adapters.result == 'skipped') &&
      (needs.build-mcp.result == 'success' || needs.build-mcp.result == 'skipped') &&
      (needs.build-desktop.result == 'success' || needs.build-desktop.result == 'skipped') &&
      (needs.build-installer.result == 'success' || needs.build-installer.result == 'skipped') &&
      (needs.build-local-brain.result == 'success' || needs.build-local-brain.result == 'skipped') &&
      (
        needs.build-cli.result == 'success' ||
        needs.build-adapters.result == 'success' ||
        needs.build-mcp.result == 'success' ||
        needs.build-desktop.result == 'success' ||
        needs.build-installer.result == 'success' ||
        needs.build-local-brain.result == 'success'
      )
    runs-on: ${{ vars.MEDOUSA_SELF_HOSTED == 'true' && fromJSON('["self-hosted","Linux","X64","medousa-publish"]') || 'ubuntu-latest' }}
    environment: MEDOUSA
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Merge release assets
        run: |
          mkdir -p dist/final
          find dist/artifacts -name 'engine-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'cli-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'adapter-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'mcp-gateway-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'medousa-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name 'medousa_local-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -type f \( \
            -name 'MedousaInstaller*' -o \
            -name 'Medousa Installer*' -o \
            -name 'Medousa_*' -o \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
            \) -exec cp {} dist/final/ \;
          : > dist/final/SHA256SUMS
          shopt -s nullglob
          for archive in dist/final/*.tar.gz dist/final/*.dmg dist/final/*.AppImage dist/final/*.deb dist/final/*.msi dist/final/*.exe; do
            [[ -f "$archive" ]] || continue
            (cd dist/final && sha256sum "$(basename "$archive")") >> dist/final/SHA256SUMS
          done
          cd dist/final && ls -la

      - name: Fetch channel manifests for merge
        if: needs.prepare.outputs.full_train != '1'
        env:
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
        run: |
          mkdir -p dist/channel-base
          base="${MEDOUSA_RELEASE_BASE_URL%/}/${MEDOUSA_RELEASE_CHANNEL}"
          curl -fsSL "${base}/release-manifest.json" -o dist/channel-base/release-manifest.json \
            || echo "no prior release-manifest (first publish)"
          curl -fsSL "${base}/installer-bootstrap.json" -o dist/channel-base/installer-bootstrap.json \
            || echo "no prior installer-bootstrap (first publish)"

      - name: Generate release manifests
        env:
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
        run: |
          ARGS=(
            --staging dist/final
            --version "${{ needs.prepare.outputs.version }}"
            --channel "${MEDOUSA_RELEASE_CHANNEL}"
            --base-url "${MEDOUSA_RELEASE_BASE_URL}"
          )
          if [[ "${{ needs.prepare.outputs.full_train }}" == "1" ]]; then
            ARGS+=(--full-train)
          elif [[ -d dist/channel-base ]]; then
            ARGS+=(--merge-base dist/channel-base)
          fi
          ./scripts/release/publish-self-hosted.sh "${ARGS[@]}"

      - name: Upload to Cloudflare R2
        if: github.event_name == 'push' || github.event.inputs.upload_r2 == 'true'
        env:
          MEDOUSA_RELEASE_BASE_URL: ${{ env.MEDOUSA_RELEASE_BASE_URL }}
          MEDOUSA_RELEASE_CHANNEL: ${{ env.MEDOUSA_RELEASE_CHANNEL }}
          MEDOUSA_R2_BUCKET: ${{ env.MEDOUSA_R2_BUCKET }}
          MEDOUSA_R2_ENDPOINT: ${{ env.MEDOUSA_R2_ENDPOINT }}
          MEDOUSA_R2_PREFIX: ${{ env.MEDOUSA_R2_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [[ -z "${AWS_ACCESS_KEY_ID:-}" || -z "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "::error::R2 secrets missing — add R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY to the MEDOUSA environment (Settings → Environments → MEDOUSA → Secrets)"
            exit 1
          fi
          ./scripts/release/upload-r2.sh dist/final

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.publish_github == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Medousa ${{ needs.prepare.outputs.tag }}
          files: |
            dist/final/engine-*.tar.gz
            dist/final/cli-*.tar.gz
            dist/final/adapter-*.tar.gz
            dist/final/mcp-gateway-*.tar.gz
            dist/final/medousa-*.tar.gz
            dist/final/medousa_local-*.tar.gz
            dist/final/release-manifest.json
            dist/final/installer-bootstrap.json
            dist/final/MedousaInstaller*
            dist/final/Medousa Installer*
            dist/final/*.dmg
            dist/final/*.msi
            dist/final/*.exe
            dist/final/*.AppImage
            dist/final/*.deb
            dist/final/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: false
