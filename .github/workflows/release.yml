name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: cli (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            adapters/medousa-whatsapp

      - name: Build release binaries
        shell: bash
        run: |
          ./scripts/release/build.sh --target "${{ matrix.target }}"

      - name: Package release archive
        shell: bash
        run: |
          ./scripts/release/package.sh --target "${{ matrix.target }}"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-cli-${{ matrix.target }}
          path: |
            dist/medousa-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  build-desktop:
    name: app (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    environment: MEDOUSA
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64

    defaults:
      run:
        working-directory: apps/medousa-home

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/medousa-home/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/medousa-home/src-tauri

      - name: Validate Apple signing secrets
        if: matrix.os == 'macos-14'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -z "${APPLE_CERTIFICATE:-}" ]] && missing+=(APPLE_CERTIFICATE)
          [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]] && missing+=(APPLE_CERTIFICATE_PASSWORD)
          [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]] && missing+=(APPLE_SIGNING_IDENTITY)
          [[ -z "${APPLE_ID:-}" ]] && missing+=(APPLE_ID)
          [[ -z "${APPLE_PASSWORD:-}" ]] && missing+=(APPLE_PASSWORD)
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=(APPLE_TEAM_ID)
          if ((${#missing[@]})); then
            echo "::error::Missing Apple signing values: ${missing[*]}"
            echo "Add them as **Environment secrets** on GitHub → Settings → Environments → Medousa"
            echo "(Repository secrets also work if you remove the job's environment: line.)"
            exit 1
          fi
          echo "Apple signing secrets are present."

      - name: Import Apple Developer certificate
        if: matrix.os == 'macos-14'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KP="${KEYCHAIN_PASSWORD:-medousa-ci-keychain}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KP" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "::error::APPLE_CERTIFICATE must contain a Developer ID Application cert (for .dmg distribution)."
            echo "You imported Apple Development — that is for local/Xcode builds only."
            echo "Export Developer ID Application from Keychain Access and update the Medousa environment secret."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop app
        env:
          CI: true
          CARGO_BUILD_TARGET: ${{ matrix.target }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID || vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID }}
        run: npm run tauri:build -- --target "${{ matrix.target }}"

      - name: Stage desktop installers
        shell: bash
        working-directory: .
        run: |
          BUNDLE="apps/medousa-home/src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p dist/desktop/${{ matrix.name }}
          find "$BUNDLE" -type f \( \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
            \) -exec cp {} "dist/desktop/${{ matrix.name }}/" \;
          ls -la "dist/desktop/${{ matrix.name }}/"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: medousa-desktop-${{ matrix.name }}
          path: dist/desktop/${{ matrix.name }}/*
          if-no-files-found: error

  release:
    name: publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Merge release assets
        shell: bash
        run: |
          mkdir -p dist/final
          find dist/artifacts -name 'medousa-*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
            \) -exec cp {} dist/final/ \;
          : > dist/final/SHA256SUMS
          shopt -s nullglob
          for archive in dist/final/medousa-*.tar.gz dist/final/*.dmg dist/final/*.AppImage dist/final/*.deb dist/final/*.msi dist/final/*.exe; do
            [[ -f "$archive" ]] || continue
            (cd dist/final && sha256sum "$(basename "$archive")") >> dist/final/SHA256SUMS
          done
          cd dist/final && ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/final/medousa-*.tar.gz
            dist/final/*.dmg
            dist/final/*.msi
            dist/final/*.exe
            dist/final/*.AppImage
            dist/final/*.deb
            dist/final/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: false
