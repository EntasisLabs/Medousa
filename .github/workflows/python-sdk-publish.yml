name: Publish Python SDK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'python-sdk-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: python/medousa-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build
        run: pip install build && python -m build
      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
